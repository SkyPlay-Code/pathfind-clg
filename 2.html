<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder AI | Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* The Giant Center Orb */
        @keyframes float-center {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); box-shadow: 0 0 60px rgba(34, 211, 238, 0.5); }
            100% { transform: translateY(0px) scale(1); }
        }
        .center-orb-container { animation: float-center 5s ease-in-out infinite; }
        .orb-core-large { background: radial-gradient(circle at 30% 30%, #fff, #22d3ee 30%, #4f46e5 80%); box-shadow: 0 0 40px rgba(34, 211, 238, 0.3), inset 0 0 30px rgba(255,255,255,0.8); }

        /* Typing Indicator Animation */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* Fade in for chat bubbles */
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Smooth scrolling for chat history */
        #chat-history { scroll-behavior: smooth; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 50px 50px;"></div>

    <div class="absolute top-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
        <div class="text-xs font-bold text-zinc-500 tracking-widest uppercase" aria-live="polite" id="progress-text">Step 1 of 3</div>
        <div class="w-32 h-1 bg-zinc-800 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-cyan-400 w-1/3 transition-all duration-500 ease-out"></div>
        </div>
    </div>

    <div class="center-orb-container relative mb-12 z-10" aria-hidden="true">
        <div class="w-24 h-24 md:w-32 md:h-32 rounded-full orb-core-large flex items-center justify-center relative">
            <div class="absolute inset-0 rounded-full border-2 border-cyan-400/40 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
            <div class="absolute inset-[-15px] rounded-full border border-blue-500/20 animate-[spin_5s_linear_infinite] border-t-cyan-300"></div>
            <div class="w-4 h-4 bg-white rounded-full animate-pulse blur-[2px]"></div>
        </div>
    </div>

    <div class="w-full max-w-2xl px-6 flex flex-col h-64 justify-end z-10 mb-8 relative">
        <div id="chat-history" class="space-y-4 overflow-y-auto pr-2 pb-4 flex flex-col" aria-live="polite">
            <div class="flex flex-col items-center text-center fade-in-up">
                <p class="text-xl md:text-2xl font-medium text-white max-w-lg leading-relaxed">
                    "I see you're aiming for Stanford. Let's build your baseline. <span class="text-cyan-400">What grade are you currently in?</span>"
                </p>
            </div>
        </div>
        
        <div id="typing-indicator" class="hidden justify-center items-center gap-1 mt-4" aria-hidden="true">
            <div class="w-2 h-2 bg-cyan-500 rounded-full typing-dot"></div>
            <div class="w-2 h-2 bg-cyan-500 rounded-full typing-dot"></div>
            <div class="w-2 h-2 bg-cyan-500 rounded-full typing-dot"></div>
        </div>
    </div>

    <div class="w-full max-w-xl px-6 z-10">
        <!-- Improved: Converted to a proper form -->
        <form id="intake-form" class="relative group">
            <input type="text" id="user-input" placeholder="Type '11th' or 'Junior'..." autocomplete="off" required
                   class="w-full glass text-white text-lg rounded-2xl pl-6 pr-16 py-4 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 transition-all text-center placeholder:text-zinc-600">
            <button type="submit" id="send-btn" aria-label="Send Message" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/10 hover:bg-cyan-500 hover:text-black text-white rounded-xl flex items-center justify-center transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
        <p class="text-center text-[10px] text-zinc-600 mt-4 uppercase tracking-widest">Press Enter to send</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatHistory = document.getElementById('chat-history');
            const intakeForm = document.getElementById('intake-form');
            const userInput = document.getElementById('user-input');
            const typingIndicator = document.getElementById('typing-indicator');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');

            let currentStep = 1;
            
            const interviewScript = {
                1: { nextQuestion: "Got it. And what is your current unweighted GPA?", progress: "33%" },
                2: { nextQuestion: "Impressive. Finally, what is one major or career path you are most curious about?", progress: "66%" },
                3: { nextQuestion: "Perfect. Initializing your custom Pathfinder Dashboard...", progress: "100%" }
            };

            function addMessage(text, isUser = false) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `fade-in-up flex flex-col ${isUser ? 'items-end' : 'items-center text-center'} w-full mt-4`;
                
                const bubble = document.createElement('div');
                if (isUser) {
                    bubble.className = "bg-zinc-800 border border-white/10 text-zinc-300 px-5 py-2.5 rounded-2xl text-sm shadow-lg";
                    bubble.textContent = text; // Safer than innerHTML for user inputs
                } else {
                    bubble.className = "text-xl md:text-2xl font-medium text-white max-w-lg leading-relaxed";
                    bubble.textContent = `"${text}"`;
                }
                
                msgDiv.appendChild(bubble);
                chatHistory.appendChild(msgDiv);
                chatHistory.scrollTop = chatHistory.scrollHeight; // Smooth scrolling handles the CSS
            }

            intakeForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = userInput.value.trim();
                if (!text) return;

                // 1. Add user message
                addMessage(text, true);
                userInput.value = '';
                userInput.disabled = true; // Lock input while AI "thinks"

                // 2. Show typing indicator
                typingIndicator.classList.remove('hidden');
                typingIndicator.classList.add('flex');
                chatHistory.appendChild(typingIndicator); // Move to bottom
                chatHistory.scrollTop = chatHistory.scrollHeight;

                // 3. Simulate AI processing time
                setTimeout(() => {
                    typingIndicator.classList.remove('flex');
                    typingIndicator.classList.add('hidden');
                    
                    const stepData = interviewScript[currentStep];
                    if (stepData) {
                        addMessage(stepData.nextQuestion, false);
                        
                        // Update Progress
                        progressBar.style.width = stepData.progress;
                        if (currentStep < 3) progressText.innerText = `Step ${currentStep + 1} of 3`;
                        
                        currentStep++;
                        userInput.disabled = false;
                        userInput.focus();

                        // If final step, simulate redirect
                        if (currentStep > 3) {
                            userInput.placeholder = "Generating dashboard...";
                            userInput.disabled = true; // Keep it disabled during redirect
                            setTimeout(() => {
                                alert("Handoff complete! Redirecting to Phase 2: The Core Dashboard (3.html)");
                                window.location.href = '3.html';
                            }, 2000);
                        } else {
                            if (currentStep === 2) userInput.placeholder = "e.g., 3.85";
                            if (currentStep === 3) userInput.placeholder = "e.g., Computer Science or Law";
                        }
                    }
                }, 1200);
            });
        });
    </script>
    <script src="hub-nav.js"></script>
</body>
</html>
